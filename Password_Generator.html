<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --bg-primary: #0a0d16;
            --bg-card: rgba(16, 22, 38, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --gradient-accent: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            background-image: radial-gradient(circle at 50% 50%, #161a2d 0%, #0a0d16 100%);
            color: var(--text-primary);
            font-family: var(--font-body);
            text-align: center;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .back-btn {
            align-self: flex-start;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            text-decoration: none;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin-left: auto;
            margin-right: auto;
            max-width: 200px;
        }

        .back-btn:hover {
            border-color: var(--accent-purple);
            transform: translateX(-3px);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        .container {
            width: 100%;
            max-width: 520px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(16px);
            margin: 0 auto;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Password Display Field */
        .password-field-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            background-color: rgba(10, 13, 22, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.2);
            background-color: rgba(10, 13, 22, 0.8);
        }

        /* Dropdown Select */
        .select-wrapper {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        label {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        select {
            padding: 10px 16px;
            font-size: 0.95rem;
            font-family: var(--font-body);
            font-weight: 500;
            color: var(--text-primary);
            background-color: #111522;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        select:focus {
            border-color: var(--accent-purple);
        }

        /* Buttons Styling */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            border: 1px solid transparent;
        }

        .btn-generate {
            background: var(--gradient-accent);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
            width: 100%;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .btn-toggle {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
        }

        .btn-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        .btn-copy {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
        }

        .btn-copy:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #22c55e;
        }

        /* Results / Message Feedbacks */
        .message-box {
            font-size: 0.9rem;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Text Feedbacks */
        .copy {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        /* Strength Indicators */
        .strength-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .strength-label {
            color: var(--text-secondary);
        }

        #strength {
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .w {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.1);
        }

        .m {
            color: #f97316;
            background-color: rgba(249, 115, 22, 0.15);
            border: 1px solid rgba(249, 115, 22, 0.2);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.1);
        }

        .s {
            color: #22c55e;
            background-color: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.2);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.1);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back to Portfolio</span>
    </a>

    <div class="container">
        <h1>Random Password Generator</h1>
        <p class="subtitle">Generate a unique, multi-character, strong password for free.</p>
        
        <div class="password-field-wrapper">
            <input type="password" id="paswrd" placeholder="Generated password shows here" readonly>
        </div>

        <div class="select-wrapper">
            <label for="length">Password Length:</label>
            <select id="length">
                <option value="6">6 Characters</option> 
                <option value="8">8 Characters</option> 
                <option value="12" selected>12 Characters</option> 
                <option value="16">16 Characters</option> 
            </select>
        </div>

        <div class="btn-group">
            <button onclick="Password()" class="btn-generate">
                <i class="fa-solid fa-key"></i> Generate Password
            </button>
            <div class="action-row">
                <button onclick="toogle()" id="tooglebtn" class="btn-toggle">
                    <i class="fa-solid fa-eye"></i> Show Password
                </button>
                <button onclick="copy()" class="btn-copy">
                    <i class="fa-solid fa-copy"></i> Copy Password
                </button>
            </div>
        </div>

        <div class="strength-container" id="strength-row" style="display: none;">
            <span class="strength-label">Security Level:</span>
            <span id="strength">-</span>
        </div>

        <div id="result" class="message-box" style="display: none;"></div>
        <div id="pass" class="message-box" style="display: none;"></div>
    </div>

    <script>
        function Password() {
            let st = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz@#&$";
            let password = "";
            let len = document.getElementById("length").value;
            for(let i = 0; i < len; i++) {
                let x = Math.floor(Math.random() * st.length);
                password += st[x];
            }
            document.getElementById("paswrd").value = password; 
            
            // Show strength row
            document.getElementById("strength-row").style.display = "flex";
            strength(password);

            // Clear result messages when generating a new password
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "none";
            const passDiv = document.getElementById("pass");
            passDiv.style.display = "none";
        }  

        function copy() {
            let copyText = document.getElementById("paswrd").value;
            const resultDiv = document.getElementById("result");
            
            if (copyText.trim() === "") {
                resultDiv.style.display = "block";
                resultDiv.innerText = "⚠️ Please generate a password first";
                resultDiv.className = "message-box error-msg";
                return;
            }
            
            navigator.clipboard.writeText(copyText);
            resultDiv.style.display = "block";
            resultDiv.innerText = "✅ Password copied to clipboard!";
            resultDiv.className = "message-box copy";
        }
           
        function strength(pwd) {
            let score = 0;

            if (/[A-Z]/.test(pwd)) score++;
            if (/[a-z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[@#&$]/.test(pwd)) score++;

            let str = document.getElementById("strength");

            if (score <= 2) {
                str.innerText = "Weak";
                str.className = "w";
            } else if (score === 3) {
                str.innerText = "Medium";
                str.className = "m";
            } else if (score === 4) {
                str.innerText = "Strong";
                str.className = "s";
            }  
        }

        // Note: keeping "toogle" spelling as it's wired to the button's onclick="toogle()"
        function toogle() {
            let x = document.getElementById("paswrd");
            const passDiv = document.getElementById("pass");

            if (x.value.trim() === "") {
                passDiv.style.display = "block";
                passDiv.innerText = "⚠️ Please generate a password first";
                passDiv.className = "message-box error-msg";
                return;
            }

            if (x.type === "password") {
                x.type = "text";
                document.getElementById("tooglebtn").innerHTML = `<i class="fa-solid fa-eye-slash"></i> Hide Password`;
            } else {
                x.type = "password";
                document.getElementById("tooglebtn").innerHTML = `<i class="fa-solid fa-eye"></i> Show Password`;
            }
        }
    </script>
</body>
</html>
